drone_controller:
  ros__parameters:
    drone_id: "0"
    max_velocity: 5.0
    max_altitude: 100.0
    battery_capacity: 5000
    battery_voltage: 14.8
    pid:
      roll:
        kp: 1.0
        ki: 0.1
        kd: 0.5
      pitch:
        kp: 1.0
        ki: 0.1
        kd: 0.5
      yaw:
        kp: 2.0
        ki: 0.05
        kd: 0.3

path_planner:
  ros__parameters:
    planning_rate: 10.0
    collision_radius: 0.5
    a_star:
      heuristic_weight: 1.0
      diagonal_cost: 1.414
      straight_cost: 1.0
    waypoint_tolerance: 0.3

vision_processor:
  ros__parameters:
    enable_aruco: true
    enable_slam: true
    aruco_marker_size: 0.05
    aruco_dictionary: "DICT_6X6_250"
